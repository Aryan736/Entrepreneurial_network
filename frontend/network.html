<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EntreNet — Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-8">
                    <span class="text-2xl font-extrabold text-blue-600 tracking-tight">EntreNet</span>
                    <div class="hidden sm:flex gap-4">
                        <a href="feed.html" class="text-gray-500 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">Feed</a>
                        <a href="network.html" class="bg-blue-50 text-blue-700 px-3 py-2 rounded-md text-sm font-medium">Network</a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div id="navAvatar" class="w-9 h-9 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm font-bold border border-blue-200 shadow-sm">
                        ?
                    </div>
                    <button onclick="logout()" class="text-gray-500 hover:text-red-600 text-sm font-medium transition-colors border border-gray-200 hover:border-red-200 px-3 py-1.5 rounded-lg">
                        Sign Out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-12">
        
        <section>
            <h2 class="text-xl font-bold text-gray-900 mb-6 pb-2 border-b border-gray-200 flex items-center gap-2">
                Pending Requests
                <span id="pendingCount" class="bg-red-100 text-red-600 text-xs px-2 py-0.5 rounded-full hidden">0</span>
            </h2>
            <div id="pendingGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <p class="text-gray-500 text-sm italic col-span-full">Loading requests...</p>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-bold text-gray-900 mb-6 pb-2 border-b border-gray-200">My Network</h2>
            <div id="networkGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <p class="text-gray-500 text-sm italic col-span-full">Loading connections...</p>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-bold text-gray-900 mb-6 pb-2 border-b border-gray-200">Discover People</h2>
            <div id="discoverGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <p class="text-gray-500 text-sm italic col-span-full">Loading suggestions...</p>
            </div>
        </section>

    </main>

    <script>
        const API = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');
        const currentUser = JSON.parse(localStorage.getItem('user') || '{}');

        // Security Check
        if (!token) window.location.href = 'login.html';

        // Utility: Get initials for avatar
        function getInitials(name) {
            return name ? name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : '?';
        }
        
        // Set Navbar Avatar
        if (currentUser.name) {
            document.getElementById('navAvatar').textContent = getInitials(currentUser.name);
        }

        // Logout logic
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // --- FETCH DATA STRATEGY ---
        async function loadAllNetworkData() {
            try {
                // Fetch all 3 endpoints concurrently
                const [pendingRes, networkRes, allUsersRes] = await Promise.all([
                    fetch(`${API}/connections/pending`, { headers: { Authorization: `Bearer ${token}` } }),
                    fetch(`${API}/connections`, { headers: { Authorization: `Bearer ${token}` } }),
                    fetch(`${API}/auth/users`, { headers: { Authorization: `Bearer ${token}` } })
                ]);

                const pending = await pendingRes.json();
                const network = await networkRes.json();
                const allUsers = await allUsersRes.json();

                renderPending(pending);
                renderNetwork(network);
                renderDiscover(allUsers);

            } catch (error) {
                console.error("Error loading network data:", error);
                alert("Trouble connecting to server.");
            }
        }

        // --- RENDER FUNCTIONS ---
        function renderPending(requests) {
            const grid = document.getElementById('pendingGrid');
            const badge = document.getElementById('pendingCount');
            
            if (!requests || requests.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 text-sm italic col-span-full bg-white p-6 rounded-xl border border-gray-100 text-center shadow-sm">No pending requests right now.</p>';
                badge.classList.add('hidden');
                return;
            }

            badge.textContent = requests.length;
            badge.classList.remove('hidden');

            grid.innerHTML = requests.map(req => `
                <div class="bg-white rounded-xl shadow-sm hover:shadow-md border border-gray-100 p-6 flex flex-col items-center text-center transition-shadow duration-200">
                    <div class="w-16 h-16 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xl font-bold mb-4 border border-blue-100">
                        ${getInitials(req.sender.name)}
                    </div>
                    <div class="text-gray-900 font-bold text-base mb-1 truncate w-full">${req.sender.name}</div>
                    <div class="text-gray-500 text-xs font-medium uppercase tracking-wider mb-5">${req.sender.role}</div>
                    <div class="flex w-full gap-2 mt-auto">
                        <button onclick="acceptRequest('${req._id}')" class="flex-1 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-2 px-3 rounded-lg text-sm transition-colors border border-green-200">
                            Accept
                        </button>
                        <button onclick="rejectRequest('${req._id}')" class="flex-1 bg-gray-50 hover:bg-red-50 text-gray-600 hover:text-red-600 font-semibold py-2 px-3 rounded-lg text-sm transition-colors border border-gray-200 hover:border-red-200">
                            Reject
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderNetwork(connections) {
            const grid = document.getElementById('networkGrid');
            
            if (!connections || connections.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 text-sm italic col-span-full bg-white p-6 rounded-xl border border-gray-100 text-center shadow-sm">You have no connections yet. Start exploring below!</p>';
                return;
            }

            grid.innerHTML = connections.map(user => `
                <div class="bg-white rounded-xl shadow-sm hover:shadow-md border border-gray-100 p-6 flex flex-col items-center text-center transition-shadow duration-200">
                    <div class="w-16 h-16 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl font-bold mb-4 border border-indigo-100">
                        ${getInitials(user.name)}
                    </div>
                    <div class="text-gray-900 font-bold text-base mb-1 truncate w-full">${user.name}</div>
                    <div class="text-gray-500 text-xs font-medium uppercase tracking-wider mb-5">${user.role}</div>
                    <button class="w-full bg-gray-50 text-gray-500 font-semibold py-2 px-4 rounded-lg text-sm border border-gray-200 cursor-default mt-auto">
                        Connected
                    </button>
                </div>
            `).join('');
        }

        function renderDiscover(users) {
            const grid = document.getElementById('discoverGrid');
            
            if (!users || users.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 text-sm italic col-span-full bg-white p-6 rounded-xl border border-gray-100 text-center shadow-sm">No other users found right now.</p>';
                return;
            }

            grid.innerHTML = users.map(user => `
                <div class="bg-white rounded-xl shadow-sm hover:shadow-md border border-gray-100 p-6 flex flex-col items-center text-center transition-shadow duration-200">
                    <div class="w-16 h-16 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xl font-bold mb-4 border border-blue-100">
                        ${getInitials(user.name)}
                    </div>
                    <div class="text-gray-900 font-bold text-base mb-1 truncate w-full">${user.name}</div>
                    <div class="text-gray-500 text-xs font-medium uppercase tracking-wider mb-5">${user.role}</div>
                    <button onclick="sendRequest('${user._id}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg text-sm transition-colors mt-auto shadow-sm">
                        Connect
                    </button>
                </div>
            `).join('');
        }

        // --- ACTION HANDLERS ---
        async function sendRequest(userId) {
            try {
                const res = await fetch(`${API}/connections/send/${userId}`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await res.json();
                
                if(res.ok) {
                    alert("Connection request sent!");
                    loadAllNetworkData(); // Refresh UI to update states
                } else {
                    alert(data.message); // Displays "already sent" or "already connected"
                }
            } catch (err) { console.error(err); }
        }

        async function acceptRequest(connectionId) {
            try {
                const res = await fetch(`${API}/connections/accept/${connectionId}`, {
                    method: 'PUT',
                    headers: { Authorization: `Bearer ${token}` }
                });
                if(res.ok) loadAllNetworkData();
            } catch (err) { console.error(err); }
        }

        async function rejectRequest(connectionId) {
            try {
                const res = await fetch(`${API}/connections/reject/${connectionId}`, {
                    method: 'PUT',
                    headers: { Authorization: `Bearer ${token}` }
                });
                if(res.ok) loadAllNetworkData();
            } catch (err) { console.error(err); }
        }

        // Initialize Page
        loadAllNetworkData();

    </script>
</body>
</html>
